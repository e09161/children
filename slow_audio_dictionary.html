<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Children's Audio Dictionary - Slow Pronunciation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
            border: 5px solid #ffd1d1;
        }
        
        header {
            background: linear-gradient(to right, #ff6b6b, #ff8e8e);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #ff5252;
        }
        
        .subtitle {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .voice-note {
            background: rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .speed-badge {
            background: #ffeaa5;
            color: #b45f06;
            padding: 8px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        
        .speed-badge i {
            font-size: 20px;
        }
        
        .showcase {
            background: #fff9e6;
            padding: 15px 20px;
            border-bottom: 3px solid #ffd1d1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .showcase-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .turtle-icon {
            background: #6b8e23;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .dictionary-list {
            padding: 20px;
            max-height: 550px;
            overflow-y: auto;
            background: #fff9f9;
        }
        
        .word-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.1);
            border: 2px solid #ffe0e0;
            transition: transform 0.2s;
        }
        
        .word-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.2);
        }
        
        .word-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .word {
            font-size: 22px;
            font-weight: 600;
            color: #b45f06;
            flex: 1;
        }
        
        .play-btn {
            background: linear-gradient(135deg, #ff8a8a, #ff6b6b);
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
            margin-left: 15px;
            flex-shrink: 0;
            font-size: 20px;
        }
        
        .play-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #ff9f9f, #ff7a7a);
        }
        
        .play-btn:active {
            transform: scale(0.95);
        }
        
        .play-btn.playing {
            background: linear-gradient(135deg, #4ecdc4, #45b7aa);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(78, 205, 196, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(78, 205, 196, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(78, 205, 196, 0);
            }
        }
        
        .voice-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: #fff2d7;
            color: #b45f06;
            border: 2px solid #ffd966;
            margin-right: 10px;
        }
        
        .rate-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: #d9e6f2;
            color: #1e4d7c;
            border: 2px solid #a3c6e9;
        }
        
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            background-color: #ffd1d1;
            color: #b45f06;
            font-size: 16px;
            font-weight: 600;
            border-top: 3px solid #ffb6b6;
        }
        
        .story-note {
            background-color: #fff2d7;
            padding: 15px 20px;
            border-bottom: 3px solid #ffd1d1;
            font-size: 16px;
            color: #b45f06;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .story-note i {
            color: #ff8a5c;
            font-size: 24px;
        }
        
        @media (max-width: 480px) {
            .container {
                border-radius: 20px;
                max-width: 95%;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .word {
                font-size: 18px;
            }
            
            .play-btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }
            
            .badge-container {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .showcase-left {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐢 Slow & Clear Dictionary</h1>
            <p class="subtitle">For young learners • Extra slow pronunciation</p>
            <div class="voice-note">
                <i class="fas fa-microphone-alt"></i> 9 phrases • 9 different voices
            </div>
        </header>
        
        <div class="showcase">
            <div class="showcase-left">
                <div class="turtle-icon">
                    <i class="fas fa-turtle"></i>
                </div>
                <div class="speed-badge">
                    <i class="fas fa-hourglass-half"></i> All phrases spoken 15-20% SLOWER
                </div>
            </div>
            <div>
                <span class="voice-badge"><i class="fas fa-flag-usa"></i> 6 US</span>
                <span class="voice-badge"><i class="fas fa-flag-uk"></i> 2 UK</span>
            </div>
        </div>
        
        <div class="story-note">
            <i class="fas fa-face-smile"></i>
            <span>Listen and learn! Each phrase has its own character voice, spoken slowly and clearly.</span>
        </div>
        
        <div class="dictionary-list" id="wordList">
            <!-- Words will be populated by JavaScript -->
        </div>
        
        <footer>
            <p><i class="fas fa-ear-listen"></i> Click any button to hear slow, clear pronunciation</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // The words with their voice descriptions
            const words = [
                {text: "throw things", voice: "⚡ Energetic (US Male)", rate: "-15%"},
                {text: "aren't afraid anymore", voice: "🦁 Brave (US Female)", rate: "-20%"},
                {text: "the boat is out on the lake", voice: "🌊 Calm (UK Female)", rate: "-20%"},
                {text: "there's a bad storm", voice: "⛈️ Serious (US Male)", rate: "-15%"},
                {text: "Let's get him to help us!", voice: "🎉 Eager (US Female)", rate: "-10%"},
                {text: "It's on the desk.", voice: "📚 Clear (US Male)", rate: "-20%"},
                {text: "It's in the pencil case.", voice: "✏️ Friendly (US Female)", rate: "-20%"},
                {text: "It's under the book.", voice: "📖 Authoritative (UK Male)", rate: "-15%"},
                {text: "It's next to the rubber.", voice: "🧸 Warm (US Male)", rate: "-20%"}
            ];
            
            // Filenames - must match what the generator creates
            const filenames = [
                "slow_audio_01_throw_things.mp3",
                "slow_audio_02_arent_afraid_anymore.mp3",
                "slow_audio_03_the_boat_is_out_on_the_lake.mp3",
                "slow_audio_04_theres_a_bad_storm.mp3",
                "slow_audio_05_lets_get_him_to_help_us.mp3",
                "slow_audio_06_its_on_the_desk.mp3",
                "slow_audio_07_its_in_the_pencil_case.mp3",
                "slow_audio_08_its_under_the_book.mp3",
                "slow_audio_09_its_next_to_the_rubber.mp3"
            ];
            
            // Populate word list
            const wordList = document.getElementById('wordList');
            let htmlString = '';
            
            for (let i = 0; i < words.length; i++) {
                htmlString += `
                    <div class="word-item">
                        <div class="word-main">
                            <span class="word">${words[i].text}</span>
                            <button class="play-btn" data-index="${i}">
                                <i class="fas fa-play"></i>
                            </button>
                        </div>
                        <div class="badge-container">
                            <span class="voice-badge">
                                <i class="fas fa-microphone"></i> ${words[i].voice}
                            </span>
                            <span class="rate-badge">
                                <i class="fas fa-turtle"></i> ${words[i].rate} slower
                            </span>
                        </div>
                    </div>
                `;
            }
            
            wordList.innerHTML = htmlString;
            
            // Audio setup
            const audioElements = [];
            for (let i = 0; i < filenames.length; i++) {
                audioElements[i] = new Audio(filenames[i]);
                audioElements[i].volume = 0.8;
            }
            
            const playButtons = document.querySelectorAll('.play-btn');
            let currentAudio = null;
            let currentButton = null;
            
            playButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const index = this.getAttribute('data-index');
                    const audio = audioElements[index];
                    
                    if (!audio) {
                        alert('Audio file not found');
                        return;
                    }
                    
                    // Stop current audio if same button
                    if (currentButton === this && !audio.paused) {
                        audio.pause();
                        audio.currentTime = 0;
                        this.classList.remove('playing');
                        this.innerHTML = '<i class="fas fa-play"></i>';
                        currentButton = null;
                        currentAudio = null;
                        return;
                    }
                    
                    // Stop any other playing audio
                    if (currentAudio && currentAudio !== audio) {
                        currentAudio.pause();
                        currentAudio.currentTime = 0;
                    }
                    
                    if (currentButton && currentButton !== this) {
                        currentButton.classList.remove('playing');
                        currentButton.innerHTML = '<i class="fas fa-play"></i>';
                    }
                    
                    // Play new audio
                    audio.play().catch(error => {
                        console.error("Error playing audio:", error);
                        alert('Error playing audio. File might be missing.');
                    });
                    
                    this.classList.add('playing');
                    this.innerHTML = '<i class="fas fa-stop"></i>';
                    
                    currentAudio = audio;
                    currentButton = this;
                    
                    // Reset on end
                    audio.onended = function() {
                        button.classList.remove('playing');
                        button.innerHTML = '<i class="fas fa-play"></i>';
                        currentButton = null;
                        currentAudio = null;
                    };
                    
                    // Handle errors
                    audio.onerror = function() {
                        console.error('Audio error');
                        button.classList.remove('playing');
                        button.innerHTML = '<i class="fas fa-play"></i>';
                        currentButton = null;
                        currentAudio = null;
                    };
                });
            });
        });
    </script>
</body>
</html>
